{% extends "layout.html" %}

{% block title %}
Edit Product
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow border-0">

            <div class="card-header bg-warning text-dark">

                <h4 class="mb-0">

                    <i class="bi bi-pencil-square"></i>

                    Edit Product

                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <!-- Product ID -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Product ID

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="{{ product.product_id }}"
                                readonly>

                        </div>

                        <!-- Product Name -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Product Name

                            </label>

                            <input
                                type="text"
                                name="product_name"
                                class="form-control"
                                value="{{ product.product_name }}"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <!-- Category -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Category

                            </label>

                            <input
                                type="text"
                                name="category"
                                class="form-control"
                                value="{{ product.category }}"
                                required>

                        </div>

                        <!-- Price -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Price (₹)

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="price"
                                class="form-control"
                                value="{{ product.price }}"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <!-- Quantity -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Quantity

                            </label>

                            <input
                                type="number"
                                name="quantity"
                                class="form-control"
                                value="{{ product.quantity }}"
                                required>

                        </div>

                        <!-- Status -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Current Status

                            </label>

                            {% if product.quantity > 10 %}

                            <input
                                class="form-control bg-success text-white"
                                value="In Stock"
                                readonly>

                            {% elif product.quantity > 0 %}

                            <input
                                class="form-control bg-warning"
                                value="Low Stock"
                                readonly>

                            {% else %}

                            <input
                                class="form-control bg-danger text-white"
                                value="Out of Stock"
                                readonly>

                            {% endif %}

                        </div>

                    </div>

                    <hr>

                    <div class="d-flex justify-content-end">

                        <a href="/view_products"
                           class="btn btn-secondary me-2">

                            Cancel

                        </a>

                        <button
                            type="submit"
                            class="btn btn-warning">

                            <i class="bi bi-save"></i>

                            Update Product

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
