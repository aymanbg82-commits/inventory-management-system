{% extends "layout.html" %}

{% block title %}
Sales
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-9">

        <div class="card shadow border-0">

            <div class="card-header bg-success text-white">

                <h4 class="mb-0">

                    <i class="bi bi-cart-check"></i>

                    New Sale

                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <!-- Product -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Product

                            </label>

                            <select
                                name="product_id"
                                id="product"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Product
                                </option>

                                {% for product in products %}

                                <option
                                    value="{{ product.product_id }}"
                                    data-price="{{ product.price }}"
                                    data-stock="{{ product.quantity }}"
                                    data-category="{{ product.category }}">

                                    {{ product.product_name }} ({{ product.product_id }})

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <!-- Quantity -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Quantity Sold

                            </label>

                            <input
                                type="number"
                                id="qty"
                                name="quantity"
                                class="form-control"
                                min="1"
                                placeholder="Enter Quantity"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <!-- Price -->

                        <div class="col-md-4 mb-3">

                            <label class="form-label fw-bold">

                                Product Price (₹)

                            </label>

                            <input
                                type="text"
                                id="price"
                                class="form-control"
                                readonly>

                        </div>

                        <!-- Stock -->

                        <div class="col-md-4 mb-3">

                            <label class="form-label fw-bold">

                                Available Stock

                            </label>

                            <input
                                type="text"
                                id="stock"
                                class="form-control"
                                readonly>

                        </div>

                        <!-- Category -->

                        <div class="col-md-4 mb-3">

                            <label class="form-label fw-bold">

                                Category

                            </label>

                            <input
                                type="text"
                                id="category"
                                class="form-control"
                                readonly>

                        </div>

                    </div>

                    <div class="row">

                        <div class="col-md-12 mb-3">

                            <label class="form-label fw-bold">

                                Total Amount (₹)

                            </label>

                            <input
                                type="text"
                                id="total"
                                class="form-control"
                                readonly>

                        </div>

                    </div>

                    <div
                        id="warning"
                        class="alert alert-danger d-none">

                    </div>

                    <hr>

                    <div class="d-flex justify-content-end">

                        <a href="/dashboard"
                           class="btn btn-secondary me-2">

                            Cancel

                        </a>

                        <button
                            type="submit"
                            class="btn btn-success">

                            <i class="bi bi-check-circle"></i>

                            Complete Sale

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}

{% block scripts %}

<script>

const product=document.getElementById("product");

const price=document.getElementById("price");

const stock=document.getElementById("stock");

const category=document.getElementById("category");

const qty=document.getElementById("qty");

const total=document.getElementById("total");

const warning=document.getElementById("warning");

product.addEventListener("change",function(){

    const selected=this.options[this.selectedIndex];

    price.value=selected.dataset.price || "";

    stock.value=selected.dataset.stock || "";

    category.value=selected.dataset.category || "";

    calculate();

});

qty.addEventListener("input",calculate);

function calculate(){

    let p=parseFloat(price.value)||0;

    let q=parseInt(qty.value)||0;

    let s=parseInt(stock.value)||0;

    total.value=(p*q).toFixed(2);

    if(q>s){

        warning.classList.remove("d-none");

        warning.innerHTML="⚠ Quantity exceeds available stock!";

    }

    else{

        warning.classList.add("d-none");

    }

}

</script>

{% endblock %}
