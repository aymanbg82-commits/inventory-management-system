{% extends "layout.html" %}

{% block title %}
Add Product
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card shadow border-0">

            <div class="card-header bg-primary text-white">

                <h4 class="mb-0">

                    <i class="bi bi-plus-circle"></i>

                    Add New Product

                </h4>

            </div>

            <div class="card-body">

                <form method="POST">

                    <div class="row">

                        <!-- Product ID -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Product ID

                            </label>

                            <input
                                type="text"
                                name="product_id"
                                class="form-control"
                                placeholder="P001"
                                required>

                        </div>

                        <!-- Product Name -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Product Name

                            </label>

                            <input
                                type="text"
                                name="product_name"
                                class="form-control"
                                placeholder="Enter Product Name"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <!-- Category -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Category

                            </label>

                            <select
                                name="category"
                                class="form-select"
                                required>

                                <option value="">
                                    Select Category
                                </option>

                                <option>Electronics</option>

                                <option>Furniture</option>

                                <option>Accessories</option>

                                <option>Books</option>

                                <option>Clothing</option>

                                <option>Other</option>

                            </select>

                        </div>

                        <!-- Price -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Price (₹)

                            </label>

                            <input
                                type="number"
                                step="0.01"
                                name="price"
                                class="form-control"
                                placeholder="0.00"
                                required>

                        </div>

                    </div>

                    <div class="row">

                        <!-- Quantity -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Quantity

                            </label>

                            <input
                                type="number"
                                name="quantity"
                                class="form-control"
                                placeholder="0"
                                required>

                        </div>

                        <!-- Status Preview -->

                        <div class="col-md-6 mb-3">

                            <label class="form-label fw-bold">

                                Stock Status

                            </label>

                            <input
                                type="text"
                                class="form-control"
                                value="Automatically Generated"
                                readonly>

                        </div>

                    </div>

                    <hr>

                    <div class="d-flex justify-content-end">

                        <a href="/view_products"
                           class="btn btn-secondary me-2">

                            Cancel

                        </a>

                        <button
                            type="submit"
                            class="btn btn-primary">

                            <i class="bi bi-check-circle"></i>

                            Save Product

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
